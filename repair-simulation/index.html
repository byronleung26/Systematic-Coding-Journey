<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维修模拟器 - 工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        
        /* 顶部导航 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #16213e;
            border-bottom: 2px solid #e94560;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        
        .stats {
            display: flex;
            gap: 2rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        
        /* 主区域：3D工作台 + 右侧面板 */
        .main {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        /* 3D工作台区域 */
        .workspace {
            flex: 3;
            background: #0f0f1a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #333;
        }
        
        .workspace-placeholder {
            text-align: center;
            color: #666;
        }
        
        .workspace-placeholder h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        /* 右侧工具面板 */
        .tool-panel {
            flex: 1;
            background: #16213e;
            padding: 1.5rem;
            overflow-y: auto;
        }
        
        .tool-panel h3 {
            margin-bottom: 1rem;
            color: #e94560;
        }
        
        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .tool {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .tool:hover {
            background: #e94560;
            transform: translateX(5px);
        }
        
        .tool-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        
        .tool-desc {
            font-size: 0.8rem;
            color: #aaa;
        }
        
        /* 零件列表 */
        .parts-list {
            margin-top: 2rem;
        }
        
        .part {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: #1a1a2e;
            margin-bottom: 0.5rem;
            border-radius: 6px;
        }
        
        .part-name {
            font-weight: bold;
        }
        
        .part-status {
            color: #4ade80;
        }
        
        .part-status.broken {
            color: #e94560;
        }
        
        button {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        button:hover {
            background: #ff6b8a;
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <nav class="navbar">
        <div class="logo">🔧 维修模拟器</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value">💰 1000</div>
                <div>金币</div>
            </div>
            <div class="stat">
                <div class="stat-value">⭐ 1</div>
                <div>等级</div>
            </div>
            <div class="stat">
                <div class="stat-value">✅ 0</div>
                <div>完成订单</div>
            </div>
        </div>
    </nav>
    
    <!-- 主区域 -->
    <div class="main">
        <!-- 3D工作台区域 -->
        <div class="workspace">
            <div class="workspace-placeholder">
                <h2>🛠️ 维修工作台</h2>
                <p>3D模型区域（Three.js）</p>
                <p style="font-size: 0.8rem; margin-top: 1rem;">点击右侧工具维修零件</p>
            </div>
        </div>
        
        <!-- 右侧工具面板 -->
        <div class="tool-panel">
            <h3>🔨 工具箱</h3>
            <div class="tool-list">
                <div class="tool" data-tool="screwdriver">
                    <div class="tool-name">🪛 螺丝刀</div>
                    <div class="tool-desc">修复松动零件</div>
                </div>
                <div class="tool" data-tool="wrench">
                    <div class="tool-name">🔧 扳手</div>
                    <div class="tool-desc">拧紧螺丝</div>
                </div>
                <div class="tool" data-tool="solder">
                    <div class="tool-name">⚡ 电烙铁</div>
                    <div class="tool-desc">焊接电路</div>
                </div>
            </div>
            
            <h3 style="margin-top: 2rem;">🔩 零件状态</h3>
            <div class="parts-list" id="parts-list">
                <div class="part" data-part="engine">
                    <span class="part-name">发动机</span>
                    <span class="part-status broken">损坏</span>
                </div>
                <div class="part" data-part="battery">
                    <span class="part-name">电池</span>
                    <span class="part-status broken">损坏</span>
                </div>
                <div class="part" data-part="circuit">
                    <span class="part-name">电路板</span>
                    <span class="part-status broken">损坏</span>
                </div>
            </div>
            
            <button id="reset-btn">🔄 重置维修</button>
        </div>
    </div>
    
    <script>
        // 游戏状态
        let gold = 1000;
        let level = 1;
        let completedOrders = 0;
        
        // 零件状态
        let parts = {
            engine: { name: '发动机', status: 'broken', repairCost: 100 },
            battery: { name: '电池', status: 'broken', repairCost: 50 },
            circuit: { name: '电路板', status: 'broken', repairCost: 150 }
        };
        
        // 当前选中的工具
        let selectedTool = null;
        
        // 更新UI显示
        function updateUI() {
            document.querySelector('.stat-value').textContent = `💰 ${gold}`;
            // 更新零件列表
            const partsList = document.getElementById('parts-list');
            partsList.innerHTML = '';
            for (let [key, part] of Object.entries(parts)) {
                const div = document.createElement('div');
                div.className = 'part';
                div.setAttribute('data-part', key);
                div.innerHTML = `
                    <span class="part-name">${part.name}</span>
                    <span class="part-status ${part.status === 'broken' ? 'broken' : ''}">
                        ${part.status === 'broken' ? '损坏' : '已修复'}
                    </span>
                `;
                div.onclick = () => repairPart(key);
                partsList.appendChild(div);
            }
        }
        
        // 维修零件
        function repairPart(partKey) {
            const part = parts[partKey];
            if (part.status === 'fixed') {
                alert('这个零件已经修好了！');
                return;
            }
            
            if (gold >= part.repairCost) {
                gold -= part.repairCost;
                part.status = 'fixed';
                updateUI();
                alert(`✅ 成功修复 ${part.name}！`);
                
                // 检查是否全部修好
                const allFixed = Object.values(parts).every(p => p.status === 'fixed');
                if (allFixed) {
                    alert('🎉 恭喜！所有零件都修好了！获得新订单！');
                    completedOrders++;
                    resetParts();
                }
            } else {
                alert(`💰 金币不足！修复${part.name}需要${part.repairCost}金币`);
            }
        }
        
        // 重置零件（新订单）
        function resetParts() {
            for (let key in parts) {
                parts[key].status = 'broken';
            }
            updateUI();
        }
        
        // 重置所有
        function resetGame() {
            gold = 1000;
            completedOrders = 0;
            resetParts();
            updateUI();
            alert('🔄 游戏已重置');
        }
        
        // 工具点击效果
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('click', () => {
                selectedTool = tool.dataset.tool;
                alert(`🔧 已选择 ${tool.querySelector('.tool-name').textContent}`);
            });
        });
        
        // 重置按钮
        document.getElementById('reset-btn').addEventListener('click', resetGame);
        
        // 初始化
        updateUI();
    </script>
</body>
</html>
